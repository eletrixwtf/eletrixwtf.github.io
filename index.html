<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="Permissions-Policy" content="interest-cohort=()"/>
</head>
<body>
  <div id="app">
    <!-- Chat app content will go here -->
    <h1>Welcome to the Chat App</h1>
    <input type="text" id="usernameInput" placeholder="Enter your username">
    <button onclick="setUsername()">Set Username</button>
    <div id="chatContainer">
      <div id="globalChat1" class="chat">
        <h2>Global Chat 1</h2>
        <ul id="globalChat1Messages"></ul>
        <input type="text" id="globalChat1MessageInput" placeholder="Type your message">
        <button onclick="sendMessage('globalChat1')">Send</button>
      </div>
      <div id="globalChat2" class="chat">
        <h2>Global Chat 2</h2>
        <ul id="globalChat2Messages"></ul>
        <input type="text" id="globalChat2MessageInput" placeholder="Type your message">
        <button onclick="sendMessage('globalChat2')">Send</button>
      </div>
      <div id="privateChat" class="chat">
        <h2>Private Chat</h2>
        <ul id="privateChatMessages"></ul>
        <input type="text" id="privateChatMessageInput" placeholder="Type your message">
        <input type="text" id="privateChatUsernameInput" placeholder="Enter recipient's username">
        <button onclick="sendPrivateMessage()">Send</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="script.js"></script>
</body>
</html>
