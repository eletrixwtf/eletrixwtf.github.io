<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #1f1f1f;
        color: #ffffff;
        margin: 0;
        padding: 0;
    }

    .dark-theme {
        background-color: #333333;
    }

    .chat-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    .chat-messages {
        flex: 1;
        overflow-y: scroll;
        padding: 20px;
    }

    .message {
        margin-bottom: 10px;
    }

    .message span {
        font-weight: bold;
        margin-right: 10px;
    }

    .message time {
        font-size: 12px;
        color: #888888;
    }

    .input-container {
        display: flex;
        padding: 10px;
        background-color: #333333;
    }

    .input-container input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
    }

    .input-container button {
        padding: 10px 20px;
        margin-left: 10px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        background-color: #007bff;
        color: #ffffff;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="input-container">
        <input type="text" id="message-input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.0.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.1/firebase-database.js"></script>
<script>
    // Initialize Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAG-N5Vn9nw4MRfGg13gSOlTLAkjmpJU1I",
        authDomain: "randomchat1200.firebaseapp.com",
        databaseURL: "https://randomchat1200-default-rtdb.firebaseio.com",
        projectId: "randomchat1200",
        storageBucket: "randomchat1200.appspot.com",
        messagingSenderId: "388785710092",
        appId: "1:388785710092:web:037248699fd99f9b2ffa29"
    };
    firebase.initializeApp(firebaseConfig);

    const database = firebase.database();
    const chatMessages = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');

    // Prompt for username
    window.onload = function() {
        const username = prompt('Enter your username:');
        if (username.trim() !== '') {
            localStorage.setItem('username', username);
        }
    };

    function sendMessage() {
        const message = messageInput.value;
        if (message.trim() !== '') {
            const timestamp = new Date().toISOString();
            const newMessageRef = database.ref('messages').push();
            newMessageRef.set({
                message: message,
                timestamp: timestamp
            });
            messageInput.value = '';
        }
    }

    database.ref('messages').on('child_added', function(snapshot) {
        const messageData = snapshot.val();
        const messageElement = document.createElement('div');
        messageElement.classList.add('message');
        const username = localStorage.getItem('username');
        messageElement.innerHTML = `<span>${username}</span> ${messageData.message} <time>${messageData.timestamp}</time>`;
        chatMessages.appendChild(messageElement);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    });

    // Prevent form submission from reloading the page
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        sendMessage();
    });

    // Debug mode
    let debugMode = false;

    function enterDebugMode() {
        debugMode = true;
        console.log('Debug mode activated');
        showDebugMenu();
    }

    function showDebugMenu() {
        const debugMenu = document.createElement('div');
        debugMenu.innerHTML = `
            <div id="debug-menu" style="position: fixed; top: 10px; right: 10px; background-color: rgba(0, 0, 0, 0.8); color: #ffffff; padding: 10px; border-radius: 5px;">
                <h3>Debug Menu</h3>
                <button onclick="clearMessages()">Clear Messages</button>
                <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
                <button onclick="exitDebugMode()">Exit Debug Mode</button>
            </div>
        `;
        document.body.appendChild(debugMenu);
    }

    function clearMessages() {
        if (debugMode) {
            database.ref('messages').remove();
            console.log('Messages cleared');
        }
    }

    function toggleDarkMode() {
        if (debugMode) {
            document.body.classList.toggle('dark-theme');
            console.log('Dark mode toggled');
        }
    }

    function exitDebugMode() {
        debugMode = false;
        const debugMenu = document.getElementById('debug-menu');
        if (debugMenu) {
            debugMenu.remove();
        }
        console.log('Debug mode deactivated');
    }

    // Listen for console input
    function consoleListener() {
        let command = '';
        const debugCommand = 'activatedebugmode';
        const listener = function(e) {
            if (e.key === 'Enter') {
                if (command === debugCommand) {
                    enterDebugMode();
                }
                command = '';
            } else {
                command += e.key;
            }
        };
        return listener;
    }

    // Add console event listener
    const listener = consoleListener();
    window.addEventListener('keydown', listener);
</script>
</body>
</html>
